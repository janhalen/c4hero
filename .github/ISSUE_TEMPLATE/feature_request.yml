name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! c4hero aims to stay focused on
        C4-style visual modelling and Structurizr-compatible DSL editing.
        Proposals that preserve the local-first, file-backed model are easier
        to merge.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and where does c4hero fall short today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or change you'd like. Sketches, mockups, or DSL snippets welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why they didn't fit.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to related issues, Structurizr docs, prior art, etc.
