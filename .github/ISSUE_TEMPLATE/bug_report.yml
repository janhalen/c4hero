name: Bug report
description: Something in c4hero is broken or behaves unexpectedly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!

        c4hero is maintained by one person in their spare time. To help me
        triage your issue quickly, **please fill in every required field**.
        Issues missing browser, OS, or reproduction steps may be closed
        with a request to add them.

        For security issues, do **not** file a public issue —
        see [SECURITY.md](../SECURITY.md) instead.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One- or two-sentence description of the problem.
      placeholder: "Dragging a connection handle on a group node fails to create an edge."
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact sequence you followed. Numbered steps preferred.
      placeholder: |
        1. Load the Big Bank sample.
        2. Open the Container view for Internet Banking System.
        3. Drag from Mobile App's right handle to the Mainframe Banking System node.
        4. Release — no edge appears.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser + OS
      description: Required. Include browser version and operating system.
      placeholder: "Chrome 131 on macOS 15"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: c4hero version / commit
      description: Either the tag, or the commit SHA shown in the UI footer.
      placeholder: "v0.2.0"
    validations:
      required: true

  - type: textarea
    id: dsl
    attributes:
      label: Minimal `.dsl` snippet (if relevant)
      description: |
        For DSL parsing, rendering, or save/load bugs, paste the smallest
        workspace that reproduces the issue. Skip this field if the bug is
        not DSL-related (e.g. a UI interaction bug).
      render: text

  - type: textarea
    id: console
    attributes:
      label: Console errors
      description: Paste any relevant output from the browser devtools console.
      render: shell
